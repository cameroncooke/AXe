name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and verify (e.g., v1.0.43)'
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  production-release:
    uses: ./.github/workflows/release-shared.yml
    secrets: inherit
    with:
      mode: ${{ github.event_name == 'push' && 'production-shipping' || 'production-verify' }}
      requested_ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}
