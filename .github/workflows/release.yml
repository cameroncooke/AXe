name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v1.0.43)'
        required: false
        type: string
      tap_repo:
        description: 'Homebrew tap repo (owner/name). Leave blank to skip tap update.'
        required: false
        type: string
        default: ''
      tap_target:
        description: 'Tap target(s): production, staging, both, skip (comma-separated). Default chooses staging for prerelease, production otherwise.'
        required: false
        type: string
        default: ''
      tap_formula:
        description: 'Homebrew formula name'
        required: false
        type: string
        default: 'axe'
      tap_branch:
        description: 'Homebrew tap branch'
        required: false
        type: string
        default: 'main'
      staging_tap_repo:
        description: 'Staging Homebrew tap repo (owner/name)'
        required: false
        type: string
        default: 'cameroncooke/axe-staging'
      staging_tap_formula:
        description: 'Staging Homebrew formula name'
        required: false
        type: string
        default: 'axe'
      staging_tap_branch:
        description: 'Staging Homebrew tap branch'
        required: false
        type: string
        default: 'main'
      create_release:
        description: 'Create a GitHub release on manual runs'
        required: false
        type: boolean
        default: false
      prerelease:
        description: 'Mark manual releases as prerelease'
        required: false
        type: boolean
        default: true

env:
  ARCHIVE_NAME: AXe-macOS # Name for the release archive

permissions:
  contents: write
  actions: read

jobs:
  build-and-release:
    runs-on: macos-latest

    outputs:
      archive_name: ${{ steps.create_archive.outputs.archive_name }}
      archive_sha256: ${{ steps.create_archive.outputs.sha256 }}
      homebrew_archive_name: ${{ steps.create_homebrew_archive.outputs.archive_name }}
      homebrew_archive_sha256: ${{ steps.create_homebrew_archive.outputs.archive_sha256 }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      package_path: ${{ steps.notarize.outputs.package_path }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26.2'

    - name: Install dependencies
      run: |
        brew install jq

    - name: Extract version from tag
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG=$(git describe --tags --abbrev=0)
          fi
          echo "Using tag from manual trigger: $TAG"
        else
          TAG=${GITHUB_REF#refs/tags/}
          echo "Using tag from push event: $TAG"
        fi

        VERSION=${TAG#v}
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        echo "Building version: $VERSION"

    - name: Restore idb repository cache
      uses: actions/cache/restore@v4
      with:
        path: idb_checkout
        key: idb-repo-${{ runner.os }}-dummy
        restore-keys: |
          idb-repo-${{ runner.os }}-

    - name: Check IDB repository freshness
      id: idb_check
      run: |
        set -e

        # Get latest remote commit
        REMOTE_COMMIT=$(git ls-remote https://github.com/facebook/idb.git HEAD | cut -f1)
        echo "Latest IDB commit on remote: $REMOTE_COMMIT"

        if [ -d "idb_checkout" ] && [ -d "idb_checkout/.git" ]; then
          # We have a cached repo, check if it's up to date
          LOCAL_COMMIT=$(git -C idb_checkout rev-parse HEAD)
          echo "Cached IDB commit: $LOCAL_COMMIT"

          if [ "$LOCAL_COMMIT" = "$REMOTE_COMMIT" ]; then
            echo "✅ Cached IDB repository is up to date"
            echo "needs_setup=false" >> "$GITHUB_OUTPUT"
          else
            echo "🔄 Cached IDB repository is outdated, needs refresh"
            echo "needs_setup=true" >> "$GITHUB_OUTPUT"
          fi
        else
          # No cached repo or invalid cache
          echo "📥 No cached IDB repository found, needs setup"
          echo "needs_setup=true" >> "$GITHUB_OUTPUT"
        fi

        # Always output the remote commit for cache keys
        echo "idb_commit=$REMOTE_COMMIT" >> "$GITHUB_OUTPUT"

    - name: Setup - Clone IDB repository
      if: steps.idb_check.outputs.needs_setup == 'true'
      run: |
        chmod +x scripts/build.sh
        scripts/build.sh setup

    - name: Make build script executable
      run: chmod +x scripts/build.sh

    # Build Script Steps - Only needed if IDB was updated
    - name: Clean - Remove previous build artifacts
      if: steps.idb_check.outputs.needs_setup == 'true'
      run: scripts/build.sh clean

    - name: Build - IDB Frameworks
      if: steps.idb_check.outputs.needs_setup == 'true'
      run: scripts/build.sh frameworks

    - name: Install - Copy frameworks to build directory
      if: steps.idb_check.outputs.needs_setup == 'true'
      run: scripts/build.sh install

    - name: Strip - Remove nested frameworks
      if: steps.idb_check.outputs.needs_setup == 'true'
      run: scripts/build.sh strip

    # Code Signing Setup
    - name: Setup - Import code signing certificate
      env:
        DEVELOPER_ID_APPLICATION_P12: ${{ secrets.DEVELOPER_ID_APPLICATION_P12 }}
        DEVELOPER_ID_APPLICATION_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_PASSWORD }}
      run: |
        set -e
        if [ -z "$DEVELOPER_ID_APPLICATION_P12" ]; then
          echo "⚠️ No certificate provided - builds will be unsigned"
          exit 0
        fi

        echo "🔐 Setting up code signing certificate..."
        KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
        KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

        # Create and configure keychain
        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        # Import certificate
        echo "$DEVELOPER_ID_APPLICATION_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
        if [ -z "$DEVELOPER_ID_APPLICATION_PASSWORD" ]; then
          security import "$RUNNER_TEMP/certificate.p12" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
        else
          security import "$RUNNER_TEMP/certificate.p12" -P "$DEVELOPER_ID_APPLICATION_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
        fi

        # Configure keychain
        security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed s/\"//g)
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        echo "✅ Code signing certificate imported successfully"

    - name: Setup - Prepare notarization API key
      env:
        NOTARIZE_APP_STORE_CONNECT_API_KEY: ${{ secrets.NOTARIZE_APP_STORE_CONNECT_API_KEY }}
      run: |
        set -e
        if [ -z "$NOTARIZE_APP_STORE_CONNECT_API_KEY" ]; then
          echo "❌ ERROR: Notarization API key is required but not provided"
          echo "Please set NOTARIZE_APP_STORE_CONNECT_API_KEY secret in repository settings"
          exit 1
        fi

        echo "🔑 Setting up notarization API key..."
        mkdir -p keys
        echo "$NOTARIZE_APP_STORE_CONNECT_API_KEY" | base64 --decode > keys/AuthKey_${{ secrets.NOTARIZE_APP_STORE_CONNECT_API_KEY_ID }}.p8
        echo "✅ Notarization API key prepared"

    - name: Sign - Framework binaries
      if: steps.idb_check.outputs.needs_setup == 'true'
      run: scripts/build.sh sign-frameworks

    - name: Create - XCFrameworks
      if: steps.idb_check.outputs.needs_setup == 'true'
      run: scripts/build.sh xcframeworks

    - name: Sign - XCFramework bundles
      if: steps.idb_check.outputs.needs_setup == 'true'
      run: scripts/build.sh sign-xcframeworks

    - name: Save IDB repository cache
      if: steps.idb_check.outputs.needs_setup == 'true'
      uses: actions/cache/save@v4
      with:
        path: idb_checkout
        key: idb-repo-${{ runner.os }}-${{ steps.idb_check.outputs.idb_commit }}

    - name: Prepare - Clean Swift build environment
      run: |
        echo "🧹 Cleaning Swift build environment..."
        rm -rf .build
        rm -rf ~/Library/Developer/Xcode/DerivedData/*
        echo "✅ Swift build environment cleaned"

    - name: Build - AXe executable
      env:
        SWIFT_DETERMINISTIC_HASHING: 1
        HOMEBREW_NO_AUTO_UPDATE: 1
        CI_BUILD: "true"
        TMPDIR: "/tmp"
        TMP: "/tmp"
        TEMP: "/tmp"
        XDG_CACHE_HOME: "/tmp"
        CLANG_MODULE_CACHE_PATH: "/tmp/clang-modules"
        SWIFT_MODULE_CACHE_PATH: "/tmp/swift-modules"
      run: scripts/build.sh executable

    - name: Sign - AXe executable
      run: scripts/build.sh sign-executable

    - name: Verify - Release artifact architectures
      if: steps.idb_check.outputs.needs_setup == 'true'
      run: scripts/build.sh verify-arches

    - name: Package - Create notarization package
      run: scripts/build.sh package

    - name: Notarize - Submit to Apple for notarization
      id: notarize
      env:
        NOTARIZATION_API_KEY_PATH: keys/AuthKey_${{ secrets.NOTARIZE_APP_STORE_CONNECT_API_KEY_ID }}.p8
        NOTARIZATION_KEY_ID: ${{ secrets.NOTARIZE_APP_STORE_CONNECT_API_KEY_ID }}
        NOTARIZATION_ISSUER_ID: ${{ secrets.NOTARIZE_APP_STORE_CONNECT_ISSUER_ID }}
        TEMP_DIR: ${{ runner.temp }}
      run: |
        scripts/build.sh notarize
        # The notarization step outputs the package path - we need to capture it
        PACKAGE_PATH=$(find "$RUNNER_TEMP" -name "AXe-Final-*.zip" | head -1)
        if [ -n "$PACKAGE_PATH" ]; then
          echo "package_path=$PACKAGE_PATH" >> "$GITHUB_OUTPUT"
          echo "📦 Final package location: $PACKAGE_PATH"
        else
          echo "❌ Could not find final package"
          exit 1
        fi

    - name: Create release archive
      id: create_archive
      run: |
        ARCHIVE_NAME="${{ env.ARCHIVE_NAME }}-${{ steps.version.outputs.tag }}-universal.tar.gz"
        echo "archive_name=$ARCHIVE_NAME" >> "$GITHUB_OUTPUT"

        PACKAGE_PATH="${{ steps.notarize.outputs.package_path }}"
        if [ -f "$PACKAGE_PATH" ]; then
          echo "📦 Creating release archive from: $PACKAGE_PATH"

          # Extract the package to create the tar.gz
          TEMP_EXTRACT="$RUNNER_TEMP/extract"
          ARCHIVE_ROOT="$RUNNER_TEMP/extract-archive"
          mkdir -p "$TEMP_EXTRACT" "$ARCHIVE_ROOT"
          ditto -x -k "$PACKAGE_PATH" "$TEMP_EXTRACT"

          TOP_LEVEL_DIR_COUNT=$(find "$TEMP_EXTRACT" -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')
          TOP_LEVEL_FILE_COUNT=$(find "$TEMP_EXTRACT" -mindepth 1 -maxdepth 1 -type f | wc -l | tr -d ' ')
          if [ "$TOP_LEVEL_DIR_COUNT" -eq 1 ] && [ "$TOP_LEVEL_FILE_COUNT" -eq 0 ]; then
            PACKAGE_ROOT=$(find "$TEMP_EXTRACT" -mindepth 1 -maxdepth 1 -type d | head -1)
          else
            PACKAGE_ROOT="$TEMP_EXTRACT"
          fi

          cp -R "$PACKAGE_ROOT"/. "$ARCHIVE_ROOT"/

          # Create tar.gz from extracted contents
          tar -czf "$ARCHIVE_NAME" -C "$ARCHIVE_ROOT" .

          # Calculate SHA256
          SHA256=$(shasum -a 256 "$ARCHIVE_NAME" | awk '{print $1}')
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "✅ Archive created: $ARCHIVE_NAME (SHA256: $SHA256)"
        else
          echo "❌ Package path not found: $PACKAGE_PATH"
          exit 1
        fi

    - name: Create Homebrew archive (universal)
      id: create_homebrew_archive
      run: |
        HOMEBREW_ARCHIVE_NAME="AXe-macOS-homebrew-${{ steps.version.outputs.tag }}.tar.gz"
        echo "archive_name=$HOMEBREW_ARCHIVE_NAME" >> "$GITHUB_OUTPUT"

        PACKAGE_PATH="${{ steps.notarize.outputs.package_path }}"
        if [ -f "$PACKAGE_PATH" ]; then
          echo "🍺 Creating Homebrew universal archive from: $PACKAGE_PATH"

          UNIVERSAL_ROOT="$RUNNER_TEMP/extract-homebrew-universal"
          HOMEBREW_ROOT="$RUNNER_TEMP/extract-homebrew"
          mkdir -p "$UNIVERSAL_ROOT" "$HOMEBREW_ROOT"
          ditto -x -k "$PACKAGE_PATH" "$UNIVERSAL_ROOT"

          TOP_LEVEL_DIR_COUNT=$(find "$UNIVERSAL_ROOT" -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')
          TOP_LEVEL_FILE_COUNT=$(find "$UNIVERSAL_ROOT" -mindepth 1 -maxdepth 1 -type f | wc -l | tr -d ' ')
          if [ "$TOP_LEVEL_DIR_COUNT" -eq 1 ] && [ "$TOP_LEVEL_FILE_COUNT" -eq 0 ]; then
            PACKAGE_ROOT=$(find "$UNIVERSAL_ROOT" -mindepth 1 -maxdepth 1 -type d | head -1)
          else
            PACKAGE_ROOT="$UNIVERSAL_ROOT"
          fi

          cp -R "$PACKAGE_ROOT"/. "$HOMEBREW_ROOT"/

          # IMPORTANT: Keep this stripping step.
          # Homebrew modifies binaries/framework metadata during install (relocation + ad-hoc signing).
          # If release signatures are left in place, Homebrew prints noisy "Failed applying an ad-hoc signature"
          # messages that look like install failures to users even when install succeeds.
          # We intentionally ship the Homebrew archive unsigned to keep installs clean and predictable.
          while IFS= read -r -d '' file_path; do
            if file "$file_path" | grep -q "Mach-O"; then
              codesign --remove-signature "$file_path" 2>/dev/null || true
            fi
          done < <(find "$HOMEBREW_ROOT" -type f -print0)

          find "$HOMEBREW_ROOT" \( -type d -name "*.framework" -o -type d -name "*.bundle" \) -print0 | while IFS= read -r -d '' bundle; do
            codesign --remove-signature "$bundle" 2>/dev/null || true
          done

          lipo -info "$HOMEBREW_ROOT/axe" | grep -q "arm64"
          lipo -info "$HOMEBREW_ROOT/axe" | grep -q "x86_64"

          tar -czf "$HOMEBREW_ARCHIVE_NAME" -C "$HOMEBREW_ROOT" .

          HOMEBREW_SHA256=$(shasum -a 256 "$HOMEBREW_ARCHIVE_NAME" | awk '{print $1}')
          echo "archive_sha256=$HOMEBREW_SHA256" >> "$GITHUB_OUTPUT"
          echo "✅ Homebrew universal archive created:"
          echo "  - $HOMEBREW_ARCHIVE_NAME (SHA256: $HOMEBREW_SHA256)"
        else
          echo "❌ Package path not found: $PACKAGE_PATH"
          exit 1
        fi

    - name: Smoke test packaged CLI resources
      run: |
        set -e

        PACKAGE_PATH="${{ steps.notarize.outputs.package_path }}"
        if [ ! -f "$PACKAGE_PATH" ]; then
          echo "❌ Package path not found: $PACKAGE_PATH"
          exit 1
        fi

        SMOKE_ROOT="$RUNNER_TEMP/extract-smoke"
        mkdir -p "$SMOKE_ROOT"
        ditto -x -k "$PACKAGE_PATH" "$SMOKE_ROOT"

        TOP_LEVEL_DIR_COUNT=$(find "$SMOKE_ROOT" -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')
        TOP_LEVEL_FILE_COUNT=$(find "$SMOKE_ROOT" -mindepth 1 -maxdepth 1 -type f | wc -l | tr -d ' ')
        if [ "$TOP_LEVEL_DIR_COUNT" -eq 1 ] && [ "$TOP_LEVEL_FILE_COUNT" -eq 0 ]; then
          PACKAGE_ROOT=$(find "$SMOKE_ROOT" -mindepth 1 -maxdepth 1 -type d | head -1)
        else
          PACKAGE_ROOT="$SMOKE_ROOT"
        fi

        test -d "$PACKAGE_ROOT/AXe_AXe.bundle"
        "$PACKAGE_ROOT/axe" init --print | grep -q "name: axe"

    - name: Smoke test Homebrew archive resources
      run: |
        set -e

        HOMEBREW_ARCHIVE_NAME="${{ steps.create_homebrew_archive.outputs.archive_name }}"
        if [ ! -f "$HOMEBREW_ARCHIVE_NAME" ]; then
          echo "❌ Homebrew archive not found: $HOMEBREW_ARCHIVE_NAME"
          exit 1
        fi

        SMOKE_ROOT="$RUNNER_TEMP/extract-homebrew-smoke"
        mkdir -p "$SMOKE_ROOT"
        tar -xzf "$HOMEBREW_ARCHIVE_NAME" -C "$SMOKE_ROOT"

        test -d "$SMOKE_ROOT/AXe_AXe.bundle"
        "$SMOKE_ROOT/axe" init --print | grep -q "name: axe"

    - name: Upload build artifact (manual trigger)
      if: github.event_name == 'workflow_dispatch'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.create_archive.outputs.archive_name }}
        path: ${{ steps.create_archive.outputs.archive_name }}
        retention-days: 30

    - name: Upload Homebrew artifact (manual trigger)
      if: github.event_name == 'workflow_dispatch'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.create_homebrew_archive.outputs.archive_name }}
        path: ${{ steps.create_homebrew_archive.outputs.archive_name }}
        retention-days: 30

    - name: Smoke test Homebrew install
      run: |
        set -euo pipefail

        HOMEBREW_ARCHIVE_NAME="${{ steps.create_homebrew_archive.outputs.archive_name }}"
        if [ ! -f "$HOMEBREW_ARCHIVE_NAME" ]; then
          echo "❌ Homebrew archive not found: $HOMEBREW_ARCHIVE_NAME"
          exit 1
        fi

        TEST_ROOT="$RUNNER_TEMP/homebrew-install-test"
        TAP_NAME="local/axe-test-${{ github.run_id }}"
        TAP_SOURCE_DIR="$TEST_ROOT/homebrew-axe-test"
        FORMULA_PATH="$TAP_SOURCE_DIR/Formula/axe.rb"
        HOMEBREW_CACHE_DIR="$TEST_ROOT/cache"

        rm -rf "$TEST_ROOT"
        mkdir -p "$TEST_ROOT" "$TAP_SOURCE_DIR/Formula" "$HOMEBREW_CACHE_DIR"

        scripts/generate-homebrew-formula.sh \
          --formula-class "Axe" \
          --homepage "https://github.com/${{ github.repository }}" \
          --version "${{ steps.version.outputs.version }}" \
          --url "file://${{ github.workspace }}/$HOMEBREW_ARCHIVE_NAME" \
          --sha256 "${{ steps.create_homebrew_archive.outputs.archive_sha256 }}" \
          > "$FORMULA_PATH"

        git -C "$TAP_SOURCE_DIR" init
        git -C "$TAP_SOURCE_DIR" config user.name "GitHub Actions"
        git -C "$TAP_SOURCE_DIR" config user.email "github-actions[bot]@users.noreply.github.com"
        git -C "$TAP_SOURCE_DIR" add Formula/axe.rb
        git -C "$TAP_SOURCE_DIR" -c commit.gpgsign=false commit -m "Add axe formula for smoke test"

        HOMEBREW_NO_AUTO_UPDATE=1 \
        HOMEBREW_CACHE="$HOMEBREW_CACHE_DIR" \
        brew untap "$TAP_NAME" >/dev/null 2>&1 || true

        HOMEBREW_NO_AUTO_UPDATE=1 \
        HOMEBREW_CACHE="$HOMEBREW_CACHE_DIR" \
        brew tap "$TAP_NAME" "$TAP_SOURCE_DIR"

        HOMEBREW_NO_AUTO_UPDATE=1 \
        HOMEBREW_CACHE="$HOMEBREW_CACHE_DIR" \
        brew install "$TAP_NAME/axe"

        BREW_AXE_PREFIX=$(brew --prefix "$TAP_NAME/axe")
        "$BREW_AXE_PREFIX/bin/axe" --version
        "$BREW_AXE_PREFIX/bin/axe" init --print | grep -q "name: axe"

    - name: Smoke test universal archive
      run: |
        set -euo pipefail

        ARCHIVE_NAME="${{ steps.create_archive.outputs.archive_name }}"
        if [ ! -f "$ARCHIVE_NAME" ]; then
          echo "❌ Universal archive not found: $ARCHIVE_NAME"
          exit 1
        fi

        TEST_ROOT="$RUNNER_TEMP/universal-archive-test"
        rm -rf "$TEST_ROOT"
        mkdir -p "$TEST_ROOT"

        tar -xzf "$ARCHIVE_NAME" -C "$TEST_ROOT"
        "$TEST_ROOT/axe" --version
        "$TEST_ROOT/axe" init --print | grep -q "name: axe"

    - name: Generate GitHub release notes from CHANGELOG
      if: github.event_name == 'push'
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        set -euo pipefail

        # Try target version first
        if node scripts/generate-github-release-notes.mjs \
          --version "$VERSION" \
          --out github-release-body.md; then
          echo "✅ Generated release notes for v$VERSION"
          exit 0
        fi

        # Deploy-only patch fallback: reuse the newest CHANGELOG entry older than the target version.
        CHANGELOG_FALLBACK_VERSION=$(node -e "
          const fs = require('fs');
          const targetVersion = process.argv[1];
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          const versionHeadingRegex = /^##\\s+\\[([^\\]]+)\\](?:\\s+-\\s+.*)?\\s*$/gm;
          const normalizeVersion = (value) => value.trim().replace(/^v/, '');
          function compareVersions(version1, version2) {
            const v1Base = version1.split('-')[0];
            const v2Base = version2.split('-')[0];
            const v1Pre = version1.includes('-') ? version1.slice(version1.indexOf('-') + 1) : '';
            const v2Pre = version2.includes('-') ? version2.slice(version2.indexOf('-') + 1) : '';
            if (v1Base === v2Base) {
              if (!v1Pre && v2Pre) return 1;
              if (v1Pre && !v2Pre) return -1;
              if (version1 === version2) return 0;
            }
            const sorted = [version1, version2].sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
            return sorted[0] === version1 ? -1 : 1;
          }
          let bestVersion = '';
          for (const match of changelog.matchAll(versionHeadingRegex)) {
            const version = normalizeVersion(match[1]);
            if (version === 'Unreleased') continue;
            if (compareVersions(version, targetVersion) >= 0) continue;
            if (!bestVersion || compareVersions(version, bestVersion) > 0) bestVersion = version;
          }
          process.stdout.write(bestVersion);
        " "$VERSION")

        if [ -z "$CHANGELOG_FALLBACK_VERSION" ]; then
          echo "❌ Could not determine a fallback CHANGELOG version for release notes"
          exit 1
        fi

        echo "ℹ️ No CHANGELOG notes for v$VERSION, falling back to v$CHANGELOG_FALLBACK_VERSION"
        node scripts/generate-github-release-notes.mjs \
          --version "$CHANGELOG_FALLBACK_VERSION" \
          --out github-release-body.md
        echo "✅ Generated release notes for v$VERSION using fallback v$CHANGELOG_FALLBACK_VERSION notes"

    - name: Create GitHub release
      if: github.event_name == 'push'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="${{ steps.version.outputs.tag }}"
        TITLE="Release $TAG"
        VERSION="${{ steps.version.outputs.version }}"

        if [[ "$VERSION" == *"-"* ]]; then
          PRERELEASE_FLAG="--prerelease"
        else
          PRERELEASE_FLAG=""
        fi

        if gh release view "$TAG" >/dev/null 2>&1; then
          echo "Existing release found for $TAG. Deleting..."
          gh release delete "$TAG" --yes
        fi

        gh release create "$TAG" \
          --title "$TITLE" \
          --notes-file "github-release-body.md" \
          $PRERELEASE_FLAG \
          "${{ steps.create_archive.outputs.archive_name }}" \
          "${{ steps.create_homebrew_archive.outputs.archive_name }}"

        echo "Release $TAG created."

    - name: Create GitHub release (manual trigger)
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="${{ steps.version.outputs.tag }}"
        TITLE="Release $TAG"
        VERSION="${{ steps.version.outputs.version }}"

        if [[ "${{ github.event.inputs.prerelease }}" == "true" || "$VERSION" == *"-"* ]]; then
          PRERELEASE_FLAG="--prerelease"
        else
          PRERELEASE_FLAG=""
        fi

        if gh release view "$TAG" >/dev/null 2>&1; then
          echo "🗑️ Existing release found for $TAG. Deleting..."
          gh release delete "$TAG" --yes
        fi

        gh release create "$TAG" \
          --title "$TITLE" \
          --generate-notes \
          $PRERELEASE_FLAG \
          "${{ steps.create_archive.outputs.archive_name }}" \
          "${{ steps.create_homebrew_archive.outputs.archive_name }}"

        echo "✅ Release $TAG created (manual trigger)."

    - name: Update Homebrew tap(s)
      # Skip tap updates on manual runs unless create_release is true, because no artifact is uploaded otherwise.
      if: |
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
      env:
        HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        HOMEBREW_STAGING_TAP_TOKEN: ${{ secrets.HOMEBREW_STAGING_TAP_TOKEN }}
      run: |
        set -e
        VERSION_TAG="${{ steps.version.outputs.version }}"

        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          TAP_TARGETS="${{ github.event.inputs.tap_target }}"
          if [ -z "$TAP_TARGETS" ]; then
            if [ "${{ github.event.inputs.create_release }}" = "true" ] && [[ "$VERSION_TAG" != *"-"* ]]; then
              TAP_TARGETS="production"
            else
              TAP_TARGETS="staging"
            fi
          fi
        else
          if [[ "$VERSION_TAG" == *"-"* ]]; then
            TAP_TARGETS="staging"
          else
            TAP_TARGETS="production"
          fi
        fi

        if [ -z "$TAP_TARGETS" ]; then
          echo "ℹ️ Homebrew tap update skipped - no targets requested"
          exit 0
        fi

        if [[ "$TAP_TARGETS" == "both" ]]; then
          TAP_TARGETS="production,staging"
        fi

        IFS=',' read -ra RAW_TARGETS <<< "$TAP_TARGETS"
        TARGETS=()
        for T in "${RAW_TARGETS[@]}"; do
          T_CLEAN=$(echo "$T" | tr -d '[:space:]')
          [[ -z "$T_CLEAN" ]] && continue
          TARGETS+=("$T_CLEAN")
        done

        if [ ${#TARGETS[@]} -eq 0 ]; then
          echo "ℹ️ Homebrew tap update skipped - no valid targets after normalization"
          exit 0
        fi

        for TARGET in "${TARGETS[@]}"; do
          case "$TARGET" in
            production)
              TAP_REPO="${{ github.event.inputs.tap_repo }}"
              TAP_FORMULA="${{ github.event.inputs.tap_formula }}"
              TAP_BRANCH="${{ github.event.inputs.tap_branch }}"
              TAP_REPO="${TAP_REPO:-cameroncooke/homebrew-axe}"
              TAP_FORMULA="${TAP_FORMULA:-axe}"
              TAP_BRANCH="${TAP_BRANCH:-main}"
              TOKEN="$HOMEBREW_TAP_TOKEN"
              FRIENDLY_NAME="production"
              ;;
            staging)
              TAP_REPO="${{ github.event.inputs.staging_tap_repo }}"
              TAP_FORMULA="${{ github.event.inputs.staging_tap_formula }}"
              TAP_BRANCH="${{ github.event.inputs.staging_tap_branch }}"
              TAP_REPO="${TAP_REPO:-cameroncooke/axe-staging}"
              TAP_FORMULA="${TAP_FORMULA:-axe}"
              TAP_BRANCH="${TAP_BRANCH:-main}"
              TOKEN="${HOMEBREW_STAGING_TAP_TOKEN:-$HOMEBREW_TAP_TOKEN}"
              FRIENDLY_NAME="staging"
              ;;
            skip)
              echo "ℹ️ Homebrew tap update skipped by request (target=skip)"
              continue
              ;;
            *)
              echo "❌ Unknown tap target '$TARGET' - aborting tap updates"
              exit 1
              ;;
          esac

          if [ -z "$TOKEN" ]; then
            echo "⚠️ Homebrew tap update skipped for $FRIENDLY_NAME ($TAP_REPO) - no token provided"
            continue
          fi

          echo "🍺 Updating Homebrew tap (${FRIENDLY_NAME}): ${TAP_REPO} [branch=${TAP_BRANCH}, formula=${TAP_FORMULA}]"

          WORK_DIR="tap-repo-${TARGET}"
          rm -rf "$WORK_DIR"
          GH_TOKEN="$TOKEN" gh repo clone "${TAP_REPO}" "$WORK_DIR"
          cd "$WORK_DIR"
          git checkout "${TAP_BRANCH}"
          git remote set-url origin "https://${TOKEN}@github.com/${TAP_REPO}.git"

          FORMULA_FILE="Formula/${TAP_FORMULA}.rb"
          if [ ! -f "$FORMULA_FILE" ]; then
            echo "❌ Formula file not found: $FORMULA_FILE"
            exit 1
          fi

          HOMEBREW_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/${{ steps.create_homebrew_archive.outputs.archive_name }}"
          HOMEBREW_SHA="${{ steps.create_homebrew_archive.outputs.archive_sha256 }}"

          FORMULA_CLASS="$(echo "$TAP_FORMULA" | awk -F'[-_]' '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) substr($i,2); print $0}' OFS="")"

          "${GITHUB_WORKSPACE}/scripts/generate-homebrew-formula.sh" \
            --formula-class "${FORMULA_CLASS}" \
            --homepage "https://github.com/${{ github.repository }}" \
            --version "${VERSION_TAG}" \
            --url "${HOMEBREW_URL}" \
            --sha256 "${HOMEBREW_SHA}" \
            > "$FORMULA_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FORMULA_FILE"
          if ! git diff --staged --quiet; then
            git commit -m "Update axe to v${VERSION_TAG}"
            git push origin "${TAP_BRANCH}"
            echo "✅ Homebrew formula updated successfully to v${VERSION_TAG} (${FRIENDLY_NAME})"
          else
            echo "ℹ️ No changes to commit for Homebrew formula (v${VERSION_TAG})"
          fi

          cd ..
        done

    - name: Cleanup
      if: always()
      run: |
        echo "🧹 Cleaning up sensitive files..."
        rm -rf keys/
        rm -f "$RUNNER_TEMP"/*.p12
        echo "✅ Cleanup completed"
